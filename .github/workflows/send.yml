name: WhatsApp Image Scheduler Runner

on:
  workflow_dispatch: # Allows manual trigger from the GitHub API (via the frontend)

permissions:
  contents: write  # Allows the workflow to push run.log, status.json, and qr.png back to the repo

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Maximum runtime limit of 6 hours

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip libxi6 libgconf-2-4 libnss3

      - name: Install Google Chrome
        run: |
          # Download and install stable Google Chrome
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run WhatsApp Scheduler Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/sender.py