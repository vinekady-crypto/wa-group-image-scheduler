name: WhatsApp Image Scheduler Runner

on:
  workflow_dispatch: # Allows manual trigger from the GitHub API (via the frontend)

permissions:
  contents: write  # Allows the workflow to push run.log, status.json, and qr.png back to the repo

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Maximum runtime limit of 6 hours

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run WhatsApp Scheduler Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/sender.py